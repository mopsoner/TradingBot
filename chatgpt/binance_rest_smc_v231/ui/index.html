<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Binance REST SMC Lite V2.3.1</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header>
    <h1>Binance REST SMC Lite</h1>
    <p id="meta">Chargement...</p>
    <nav class="topnav">
      <a href="/ui/">Dashboard</a>
      <a href="/ui/admin.html">Admin</a>
    </nav>
  </header>
  <main>
    <section class="card compact">
      <h2>Résumé</h2>
      <div id="stats" class="stats-row"></div>
    </section>
    <section class="card compact">
      <div class="section-head">
        <h2>Backtest</h2>
        <span class="hint">Rapport local</span>
      </div>
      <div id="backtest" class="stats-grid"></div>
    </section>
    <section class="card compact">
      <div class="section-head">
        <h2>Filtres</h2>
        <span class="hint">Mobile friendly</span>
      </div>
      <div class="controls">
        <input id="filterSymbol" type="text" placeholder="Symbole (ex: ETH)">
        <select id="filterBias">
          <option value="all">Tous les biais</option>
          <option value="bull_watch">bull_watch</option>
          <option value="bull_confirm">bull_confirm</option>
          <option value="bear_watch">bear_watch</option>
          <option value="bear_confirm">bear_confirm</option>
          <option value="neutral">neutral</option>
        </select>
        <input id="filterScore" type="number" min="0" max="10" step="1" value="0" placeholder="Score min">
      </div>
      <div class="toggles">
        <label class="toggle"><input id="toggleTopOnly" type="checkbox"> Top only</label>
        <label class="toggle"><input id="togglePipeline" type="checkbox" checked> Pipeline</label>
        <label class="toggle"><input id="toggleTrade" type="checkbox" checked> Trade</label>
      </div>
    </section>
    <section class="card">
      <div class="section-head">
        <h2>Top signaux</h2>
        <span class="hint">Priorité mobile</span>
      </div>
      <div id="top" class="grid"></div>
    </section>
    <section class="card compact">
      <div class="section-head">
        <h2>Batch en cours</h2>
        <span class="hint">Rotation active</span>
      </div>
      <div id="batch" class="batch-wrap"></div>
    </section>
    <section class="card">
      <div class="section-head">
        <h2>Signaux du batch</h2>
        <span class="hint">Vue filtrable</span>
      </div>
      <div id="signals" class="grid"></div>
    </section>
  </main>
  <script src="app.js"></script>
</body>
</html>
